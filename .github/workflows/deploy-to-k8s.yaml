name: Validation on Canonical K8s
on:
  workflow_dispatch:
    inputs:
      k8s_version:
        description: 'Kubernetes version to be used for the K8s cluster.'
        required: false
      uats_branch:
        description: 'Branch to run the UATs from e.g. main or track/1.10. By default, this is defined by the dependencies.yaml file.'
        required: false
      ckf_branch:
        description: 'Branch on the Charmed Kubeflow repository to be tested'
        required: false
      risk:
        description: 'The risk level to be tested'
        required: false
        default: 'edge'
  pull_request:
  schedule:
    - cron: "17 02 * * 1"

jobs:
  deploy-solution:
    name: Deploy to Canonical K8s
    runs-on: ["self-hosted-linux-amd64-noble-xlarge"]

    strategy:
      fail-fast: false
      matrix:
        bundle:
          - product: kubeflow
            uats:
              env: uats-remote
              extra-args: --filter "not mlflow and not feast and not spark"
          - product: kubeflow-ambient
            uats_branch: main
            uats:
              env: kubeflow-remote
              extra-args: --filter "not mlflow and not feast and not spark"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set envvars from dependencies.yaml
        run: |
          yq eval 'to_entries | .[] | "\(.key)=\(.value)"' ".github/dependencies.yaml" | while IFS= read -r line; do
            echo "$line" >> "$GITHUB_ENV"
          done

      - name: Update ENV variables from inputs if available
        run: |
          K8S_VERSION=${{ inputs.k8s_version || env.K8S_VERSION }}
          echo "K8S_VERSION=${K8S_VERSION}" >> $GITHUB_ENV
          CKF_BRANCH=${{ inputs.ckf_branch || env.CKF_BRANCH }}
          echo "CKF_BRANCH=${CKF_BRANCH}" >> $GITHUB_ENV
          RISK=${{ inputs.risk || env.RISK }}
          echo "RISK=${RISK}" >> $GITHUB_ENV
          UATS_BRANCH=${{ matrix.bundle.uats_branch || inputs.uats_branch || env.UATS_BRANCH }}
          echo "UATS_BRANCH=${UATS_BRANCH}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install tox & poetry
        run: |
          sudo apt-get install -yqq pipx
          pipx ensurepath
          sudo pipx ensurepath

          pipx install tox
          pipx install poetry

      - name: Setup environment
        run: |
          # Avoiding dockerhub rate limits (see https://canonical-self-hosted-github-runner-docs.readthedocs-hosted.com/en/latest/usage/faq/how-to-avoid-dockerhub-rate-limits/ for more informations)
          if [ -n "$DOCKERHUB_MIRROR" ]; then
          MIRROR_CONFIG=/etc/containerd/hosts.d/docker.io

          sudo mkdir -p ${MIRROR_CONFIG}
          sudo chown $USER ${MIRROR_CONFIG}
          cat << EOF > ${MIRROR_CONFIG}/hosts.toml
          [host."$DOCKERHUB_MIRROR"]
          capabilities = ["pull", "resolve"]
          EOF
          fi

          sudo apt-get remove -y docker.io containerd
          sudo rm -rf /run/containerd
          sudo snap install concierge --classic
          cd .github

          # Set the K8s version
          yq -i e '.providers.k8s.channel = "${{ env.K8S_VERSION }}-classic/stable"' concierge.yaml

          sudo concierge prepare --trace
          cd ..

      - name: Configure Cilium for Istio
        if: matrix.bundle.product == 'kubeflow-ambient'
        run: |
          # for context, see https://docs.cilium.io/en/stable/network/servicemesh/istio/
          kubectl -n kube-system patch configmap cilium-config --type merge --patch '{"data":{"bpf-lb-sock-hostns-only":"true"}}'
          kubectl -n kube-system patch configmap cilium-config --type merge --patch '{"data":{"cni-exclusive":"false"}}'
          kubectl -n kube-system rollout restart daemonset cilium

      - name: Setup terraform
        run: |
          sudo snap install terraform  --channel latest/stable --classic
          terraform --version

      - name: Deploy solution
        run: |
          if [[ '${{ github.event_name }}' != 'pull_request' ]]; then
            git checkout '${{ env.CKF_BRANCH }}'
          fi

          RISK_ARG="--risk ${{ env.RISK }}"
          PLATFORM_ARG=""
          SERVICE_MESH_TYPE_ARG=""
          if [[ "${{ matrix.bundle.product }}" == "kubeflow-ambient" ]]; then
            RISK_ARG=""
            PLATFORM_ARG="--istio-k8s-platform"
            SERVICE_MESH_TYPE_ARG="--service-mesh-type=ambient"
          fi

          tox -c ./terraform-refactoring/products/kubeflow -e test_deployment -- -vv -s $RISK_ARG $PLATFORM_ARG $SERVICE_MESH_TYPE_ARG

      - name: Get juju status
        run: juju status -m kubeflow --relations
        if: always()

      # On failure, capture debugging resources
      - name: Get juju debug logs
        run: juju debug-log --replay --no-tail -m kubeflow
        if: failure() || cancelled()

      - name: Get logs from pods with status = Pending
        run: kubectl -n kubeflow get pods | tail -n +2 | grep Pending | awk '{print $1}' | xargs -n1 kubectl -n kubeflow logs --all-containers=true --tail 100 || true
        if: failure() || cancelled()

      - name: Get logs from pods with status = Failed
        run: kubectl -n kubeflow get pods | tail -n +2 | grep Failed | awk '{print $1}' | xargs -n1 kubectl -n kubeflow logs --all-containers=true --tail 100 || true
        if: failure() || cancelled()

      - name: Get logs from pods with status = CrashLoopBackOff
        run: kubectl -n kubeflow get pods | tail -n +2 | grep CrashLoopBackOff | awk '{print $1}' | xargs -n1 kubectl -n kubeflow logs --all-containers=true --tail 100 || true
        if: failure() || cancelled()
