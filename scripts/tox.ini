[tox]
envlist = 
    tflint-{auth,core,istio-ambient,istio-sidecar,kfp,kubeflow,minio}
    validate-{auth,core,istio-ambient,istio-sidecar,kfp,kubeflow,minio}

[vars]
tf_modules_path = {tox_root}/../terraform-refactoring/

[testenv]
allowlist_externals =
    /bin/bash
    terraform
set_env =
    # set type (charms, components, products)
    auth: TYPE=components
    core: TYPE=components
    istio-ambient: TYPE=components
    istio-sidecar: TYPE=components
    kfp: TYPE=components
    kubeflow: TYPE=products
    minio: TYPE=charms
    # set module name
    auth: MODULE=auth
    core: MODULE=core
    istio-ambient: MODULE=istio-ambient
    istio-sidecar: MODULE=istio-sidecar
    kfp: MODULE=kfp
    kubeflow: MODULE=kubeflow
    minio: MODULE=minio

[testenv:tflint-{auth,core,istio-ambient,istio-sidecar,kfp,kubeflow,minio}]
description = Check Terraform code against coding style standards
allowlist_externals =
    tflint
commands =
    tflint --recursive --chdir={[vars]tf_modules_path}{env:TYPE}/{env:MODULE}

[testenv:validate-{auth,core,istio-ambient,istio-sidecar,kfp,kubeflow,minio}]
description = Apply coding style standards to code
allowlist_externals =
    terraform
commands =
    terraform -chdir={[vars]tf_modules_path}{env:TYPE}/{env:MODULE} init
    terraform -chdir={[vars]tf_modules_path}{env:TYPE}/{env:MODULE} validate -no-color 

[testenv:fmt]
description = Apply coding style standards to code
commands =
   /bin/bash -ec "find {[vars]tf_modules_path} -name '*.tf' -print0 | xargs -0 terraform fmt"

[testenv:generate-docs]
description = Generate reference docs for terraform modules
commands =
    /bin/bash generate-docs.sh
